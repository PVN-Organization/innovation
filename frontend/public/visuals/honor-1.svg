<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Chân dung minh hoạ">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf6ef"/>
      <stop offset="1" stop-color="#dfeff4"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg1)"/>
  <circle cx="34" cy="30" r="3" fill="#1dbed6" opacity="0.35"/>
  <circle cx="168" cy="46" r="3" fill="#078c3b" opacity="0.30"/>
  <circle cx="158" cy="24" r="2" fill="#1dbed6" opacity="0.30"/>
  <!-- shoulders / shirt (teal) -->
  <path d="M26 200 L26 178 Q26 150 62 145 Q100 139 138 145 Q174 150 174 178 L174 200 Z" fill="#1dbed6"/>
  <path d="M100 145 L100 200" stroke="#0f9fb4" stroke-width="2" opacity="0.5"/>
  <!-- neck -->
  <rect x="88" y="118" width="24" height="30" rx="12" fill="#e6b58c"/>
  <!-- hair (short, dark) -->
  <circle cx="100" cy="84" r="45" fill="#241d18"/>
  <!-- face -->
  <circle cx="100" cy="90" r="40" fill="#f0c39a"/>
  <!-- ears -->
  <circle cx="61" cy="92" r="7" fill="#f0c39a"/>
  <circle cx="139" cy="92" r="7" fill="#f0c39a"/>
  <!-- hair fringe -->
  <path d="M62 84 Q66 56 100 56 Q134 56 138 84 Q128 70 100 70 Q72 70 62 84 Z" fill="#241d18"/>
  <!-- eyebrows -->
  <path d="M78 84 Q86 80 94 84" stroke="#3a2f28" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M106 84 Q114 80 122 84" stroke="#3a2f28" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="86" cy="93" r="3.4" fill="#071c3a"/>
  <circle cx="114" cy="93" r="3.4" fill="#071c3a"/>
  <!-- smile -->
  <path d="M87 108 Q100 118 113 108" stroke="#c98a63" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
