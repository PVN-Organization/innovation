<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Chân dung minh hoạ">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef7f0"/>
      <stop offset="1" stop-color="#e4f3f6"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg3)"/>
  <circle cx="36" cy="34" r="3" fill="#1dbed6" opacity="0.32"/>
  <circle cx="166" cy="42" r="3" fill="#078c3b" opacity="0.30"/>
  <circle cx="160" cy="22" r="2" fill="#078c3b" opacity="0.28"/>
  <!-- hair bun (behind, top) -->
  <circle cx="100" cy="48" r="16" fill="#241c17"/>
  <!-- shoulders / top (green) -->
  <path d="M27 200 L27 179 Q27 151 63 146 Q100 140 137 146 Q173 151 173 179 L173 200 Z" fill="#078c3b"/>
  <path d="M100 146 Q92 158 100 170 Q108 158 100 146 Z" fill="#0a6f30"/>
  <!-- neck -->
  <rect x="89" y="119" width="22" height="29" rx="11" fill="#dfb188"/>
  <!-- hair (pulled back) -->
  <circle cx="100" cy="86" r="44" fill="#241c17"/>
  <!-- face -->
  <circle cx="100" cy="92" r="39" fill="#e8b88c"/>
  <!-- ears -->
  <circle cx="62" cy="94" r="6.5" fill="#e8b88c"/>
  <circle cx="138" cy="94" r="6.5" fill="#e8b88c"/>
  <!-- hairline (pulled back, smooth) -->
  <path d="M63 82 Q68 58 100 58 Q132 58 137 82 Q120 68 100 68 Q80 68 63 82 Z" fill="#241c17"/>
  <!-- eyebrows -->
  <path d="M80 85 Q87 81 94 85" stroke="#3a2f28" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M106 85 Q113 81 120 85" stroke="#3a2f28" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="87" cy="94" r="3.3" fill="#071c3a"/>
  <circle cx="113" cy="94" r="3.3" fill="#071c3a"/>
  <!-- smile -->
  <path d="M88 109 Q100 118 112 109" stroke="#c07f59" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
